# AgentBreak multi-service config example.
# Copy to config.yaml and run with: agentbreak run
#
# Run with: agentbreak run --config-file config.yaml
#
# Each service runs on its own port. Use 'scenario' to apply built-in
# fault presets, or configure fault/latency directly.
#
# List available scenarios: agentbreak list-scenarios

version: "1.0"

services:
  # OpenAI-compatible LLM proxy
  - name: openai
    type: openai
    mode: proxy
    port: 5000
    upstream_url: https://api.openai.com

    # Apply a built-in scenario (sets fault and latency defaults):
    scenario: mixed-transient

    # Or configure fault injection manually (overrides scenario):
    # fault:
    #   overall_rate: 0.2
    #   available_codes: [429, 500, 503]
    #
    # Per-code rates (each is independent - multiple can fire per request):
    # fault:
    #   per_error_rates:
    #     429: 0.3
    #     500: 0.2
    #
    # latency:
    #   probability: 0.1
    #   min_seconds: 5
    #   max_seconds: 15

  # MCP proxy (comment out if not using MCP)
  # - name: mcp
  #   type: mcp
  #   mode: mock
  #   port: 5001
  #   scenario: mcp-mixed-transient
  #
  #   # Proxy to a real MCP server:
  #   # mode: proxy
  #   # upstream_transport: http
  #   # upstream_url: http://localhost:8080
  #
  #   # Or stdio transport:
  #   # upstream_transport: stdio
  #   # upstream_command:
  #   #   - python
  #   #   - my_mcp_server.py
